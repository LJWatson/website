  - name: globals
    label: Globals
    files:
      - label: Site data
        name: site_data
        file: src/_data/site-content.json
        fields:
          - label: Site name
            name: name
            widget: string
            required: false
          - label: Site URL
            name: url
            widget: string
            required: false
          - label: Language
            name: lang
            widget: string
            required: false
          - label: Locale
            name: locale
            widget: string
            required: false
          - label: Default meta description
            name: metaDesc
            widget: text
            required: false
          - label: Default social image
            name: socialImage
            widget: image
            required: false
          - label: Default social image alt text
            name: socialImageAlt
            widget: string
            required: false
          - label: Address line 1
            name: address1
            widget: string
            required: false
          - label: Address line 2
            name: address2
            widget: string
            required: false
          - label: Town/city
            name: townCity
            widget: string
            required: false
          - label: County/state
            name: countyState
            widget: string
            required: false
          - label: Postal/ZIP code
            name: postalZipCode
            widget: string
            required: false
          - label: Country
            name: country
            widget: string
            required: false
          - label: Copyright owner
            name: copyrightOwner
            widget: string
            required: false
          - label: Email
            name: email
            widget: string
            required: false
          - label: Telephone
            name: telephone
            widget: string
            required: false
          - label: Bluesky
            name: bluesky
            widget: string
            required: false
          - label: Facebook
            name: facebook
            widget: string
            required: false
          - label: IMDb
            name: imdb
            widget: string
            required: false
          - label: Instagram
            name: instagram
            widget: string
            required: false
          - label: LinkedIn
            name: linkedin
            widget: string
            required: false
          - label: Threads
            name: threads
            widget: string
            required: false
          - label: TikTok
            name: tiktok
            widget: string
            required: false
          - label: YouTube
            name: youtube
            widget: string
            required: false
          - label: Analytics
            name: analytics
            widget: object
            collapsed: true
            fields:
              - label: Google Analytics measurement ID
                name: googleAnalyticsId
                widget: string
                required: false
              - label: Google Tag Manager container ID
                name: googleTagManagerId
                widget: string
                required: false
              - label: Plausible domain
                name: plausibleDomain
                widget: string
                required: false
              - label: Plausible script URL
                name: plausibleScriptSrc
                widget: string
                required: false
              - label: Umami script URL
                name: umamiScriptSrc
                widget: string
                required: false
              - label: Umami website ID
                name: umamiWebsiteId
                widget: string
                required: false
          - label: Fonts
            name: fonts
            widget: object
            collapsed: true
            fields:
              - label: Font loading mode
                name: mode
                widget: select
                required: false
                default: none
                options:
                  - label: None
                    value: none
                  - label: Google CDN
                    value: google
                  - label: Self-hosted stylesheet
                    value: self-hosted
              - label: Google Fonts stylesheet URL
                name: googleFontsUrl
                widget: string
                required: false
              - label: Preconnect to Google Fonts
                name: preconnectGoogleFonts
                widget: boolean
                required: false
                default: true
              - label: Self-hosted font stylesheet path
                name: stylesheet
                widget: string
                required: false
      - label: Main navigation
        name: navigation
        file: src/_data/navigation.json
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - label: Text
                name: text
                widget: string
              - label: URL
                name: url
                widget: string
      - label: Footer navigation
        name: footer_navigation
        file: src/_data/footer_navigation.json
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - label: Text
                name: text
                widget: string
              - label: URL
                name: url
                widget: string
  - name: posts
    label: Posts
    folder: src/posts
    create: true
    slug: '{{slug}}'
    preview_path: blog/{{slug}}
    fields:
      - label: Title
        name: title
        widget: string
      - label: Publish date
        name: date
        widget: datetime
      - label: Author
        name: postAuthor
        widget: string
      - label: Image
        name: image
        widget: image
        required: false
        media_folder: src/images/blog
        public_folder: /images/blog
      - label: Thumbnail image
        name: thumbnail
        widget: image
        required: false
        media_folder: src/images/blog
        public_folder: /images/blog
      - label: Summary
        name: postSummary
        widget: text
      - label: Categories
        name: postCategories
        widget: list
        allow_add: true
      - label: Tags
        name: postTags
        widget: list
        allow_add: true
      - label: Body
        name: body
        widget: markdown
